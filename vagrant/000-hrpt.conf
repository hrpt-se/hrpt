WSGIScriptAlias / /var/www/hrpt/wsgi.py
WSGIDaemonProcess hrpt python-path=/var/www/hrpt
WSGIProcessGroup hrpt
Loglevel warn

Alias /static/ /var/lib/hrpt/static/
Alias /upload/  /var/lib/hrpt/upload/
DocumentRoot /var/www/hrpt

<Directory "/var/www/hrpt">
    Order allow,deny
    Allow from all
    Require all granted
</Directory>

<Directory "/var/lib/hrpt/static">
    Options +Indexes
    Order allow,deny
    Allow from all
    Require all granted
</Directory>

<Directory "/var/lib/hrpt/upload">
    Options +Indexes
    Order allow,deny
    Allow from all
    Require all granted
</Directory>

<Location "/admin">
    Order deny,allow
    Deny from all
    Allow from 10.100.0.0/16 172.25.0.0/16 172.27.0.0/16
</Location>
